services:
  timescaledb:
    image: timescale/timescaledb:2.13.0-pg15
    container_name: tashan-weir-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tashan_weir}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      TIMESCALEDB_TELEMETRY: "off"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./sql/init_timescaledb.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./sql/002_retention_and_downsampling.sql:/docker-entrypoint-initdb.d/002_retention.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tashan-weir-net

  mqtt-broker:
    image: eclipse-mosquitto:2.0.18
    container_name: tashan-weir-mqtt
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t $$SYS/broker/uptime -C 1 -W 3 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tashan-weir-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tashan-weir-backend
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-tashan_weir}
      MQTT_BROKER: tcp://mqtt-broker:1883
      MQTT_CLIENT_ID: tashan-weir-backend
      MQTT_BASE_TOPIC: ${MQTT_BASE_TOPIC:-tashan-weir}
      PORT: "8080"
      PPROF_ENABLED: "${PPROF_ENABLED:-true}"
      PPROF_PORT: "${PPROF_PORT:-6060}"
      GIN_MODE: ${GIN_MODE:-release}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
      - "${PPROF_PORT:-6060}:6060"
    volumes:
      - ./backend/configs:/configs:ro
      - ./frontend:/frontend:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - tashan-weir-net

  sensor-simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: tashan-weir-simulator
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_URL: http://backend:8080/api/v1
      DTU_ID: ${SIM_DTU_ID:-DTU-TASHAN-001}
      INTERVAL_SECONDS: "${SIM_INTERVAL:-60}"
      SIM_SPEED: "${SIM_SPEED:-10}"
      UPSTREAM_WL: "${SIM_UPSTREAM_WL:--1}"
      DOWNSTREAM_WL: "${SIM_DOWNSTREAM_WL:--1}"
      FOUNDATION_PERMEABILITY: "${SIM_PERMEABILITY:--1}"
      RANDOM_SEED: "${SIM_RANDOM_SEED:-42}"
      ENABLE_HTTP_API: "true"
      HTTP_PORT: "8081"
    ports:
      - "${SIM_HTTP_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tashan-weir-net

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: tashan-weir-prometheus
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PROM_PORT:-9090}:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - tashan-weir-net

  grafana:
    image: grafana/grafana:10.2.3
    container_name: tashan-weir-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - timescaledb
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - tashan-weir-net

volumes:
  timescaledb-data:
  mosquitto-data:
  mosquitto-log:
  prometheus-data:
  grafana-data:

networks:
  tashan-weir-net:
    driver: bridge
